<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>原価・レシピ管理</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <h1 class="title">原価・レシピ管理</h1>
        <p class="sub">iPhoneで使いやすいように整理した原価マスター・レシピ計算アプリ</p>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <h2 class="section-title">データ取り込み</h2>

        <div class="field">
          <label class="label">CSV貼り付け</label>
          <textarea id="csvInput" class="textarea" placeholder="CSVをここに貼り付け"></textarea>
        </div>

        <div class="button-row">
          <button class="btn-dark" onclick="importCSV()">貼り付けCSV取り込み</button>
        </div>

        <div class="field">
          <label class="label">CSVファイル</label>
          <input type="file" id="csvFile" accept=".csv" class="input" />
        </div>

        <div class="button-row">
          <button class="btn-light" onclick="importCSVFile()">CSVファイル取り込み</button>
        </div>
      </section>

      <section class="card">
        <h2 class="section-title">原価マスター登録</h2>

        <div class="field">
          <label class="label">材料名</label>
          <input id="name" class="input" placeholder="例：バター" />
        </div>

        <div class="field">
          <label class="label">小分類</label>
          <input id="subcategory" class="input" placeholder="例：乳製品 / 粉類 / ナッツ" />
        </div>

        <div class="grid-2">
          <div class="field">
            <label class="label">ロット</label>
            <input id="lot" class="input" placeholder="例：450" />
          </div>

          <div class="field">
            <label class="label">価格（円）</label>
            <input id="price" class="input" placeholder="例：890" />
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label class="label">単位</label>
            <select id="unit" class="select">
              <option value="g">g</option>
              <option value="kg">kg</option>
              <option value="個">個</option>
            </select>
          </div>

          <div class="field">
            <label class="label">1個何g（任意）</label>
            <input id="gPerUnit" class="input" placeholder="例：50" />
          </div>
        </div>

        <div class="button-row">
          <button class="btn-dark" onclick="addManual()">追加</button>
          <button class="btn-danger" onclick="resetData()">全削除（初期化）</button>
        </div>
      </section>

      <section class="card">
        <button id="masterToggleBtn" class="toggle-btn" onclick="toggleMaster()">原価マスター ▼</button>

        <div id="masterSection" style="display: none;">
          <div id="list" class="list"></div>
        </div>
      </section>

      <section class="card">
        <h2 class="section-title">レシピ作成</h2>

        <div class="field">
          <label class="label">小分類で絞り込み</label>
          <select id="filterSubCategory" class="select" onchange="updateMaterialSelect()">
            <option value="">すべての分類</option>
          </select>
        </div>

        <div class="grid-2">
          <div class="field">
            <label class="label">材料</label>
            <select id="materialSelect" class="select"></select>
          </div>

          <div class="field">
            <label class="label">使用量（g）</label>
            <input id="useAmount" class="input" placeholder="例：100" />
          </div>
        </div>

        <div class="button-row">
          <button class="btn-dark" onclick="addIngredient()">材料追加</button>
        </div>

        <h3 class="sub-title">材料リスト</h3>
        <div id="recipeList" class="mini-list"></div>

        <div class="grid-2">
          <div class="field">
            <label class="label">出来高</label>
            <input id="yield" class="input" placeholder="例：12" />
          </div>

          <div class="field">
            <label class="label">出来高単位</label>
            <select id="yieldUnit" class="select">
              <option value="g">g</option>
              <option value="個">個</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label class="label">売価（円）</label>
          <input id="priceSell" class="input" placeholder="例：300" />
        </div>

        <div class="button-row">
          <button class="btn-dark" onclick="calcCost()">計算</button>
        </div>
        <input id="recipeName" class="input" placeholder="レシピ名 / 商品名">
        <button class="btn-light" onclick="saveProductCost()">商品原価を保存</button>

        <div id="result" class="result-card"></div>
      </section>
      <hr>

<button id="productToggleBtn" class="toggle-btn" onclick="toggleProducts()">商品原価一覧 ▼</button>
<div id="productSection" style="display:none;">
  <div id="productList" class="list"></div>
</div>

      <section class="card">
        <h2 class="section-title">データ管理</h2>

        <div class="button-row">
          <button class="btn-light" onclick="exportData()">保存（JSON）</button>
        </div>

        <div class="field">
          <label class="label">JSON読み込み</label>
          <input type="file" id="loadFile" accept=".json" class="input" />
        </div>

        <div class="button-row">
          <button class="btn-light" onclick="importData()">読み込み</button>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
