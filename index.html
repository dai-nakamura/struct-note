<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>原価マスター</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>原価マスター</h1>

<h2>CSV取り込み</h2>

<textarea id="csvInput" placeholder="CSV貼り付け"></textarea><br>
<button onclick="importCSV()">貼り付けCSV取り込み</button>

<br><br>

<input type="file" id="csvFile" accept=".csv">
<button onclick="importCSVFile()">CSVファイル取り込み</button>

<hr>

<h2>登録</h2>

<input id="name" placeholder="材料名"><br>
<input id="category" placeholder="分類"><br>
<input id="lot" placeholder="ロット（g）"><br>
<input id="price" placeholder="価格（円）"><br>

<select id="unit">
  <option value="g">g</option>
  <option value="kg">kg</option>
  <option value="個">個</option>
</select>

<input id="gPerUnit" placeholder="1個何g（任意）"><br>

<button onclick="addManual()">追加</button>

<hr>

<h2>一覧</h2>
<div id="list"></div>

<hr>

<h2>レシピ</h2>

<input id="recipeName" placeholder="レシピ名"><br>

<select id="materialSelect"></select>
<input id="useAmount" placeholder="使用量（g）">
<button onclick="addIngredient()">材料追加</button>

<h3>材料リスト</h3>
<div id="recipeList"></div>

<input id="yield" placeholder="出来高"><br>
<select id="yieldUnit">
  <option value="g">g</option>
  <option value="個">個</option>
</select>

<input id="priceSell" placeholder="売価（円）"><br>

<button onclick="calcCost()">計算</button>

<h3 id="result"></h3>

<hr>

<h2>データ管理</h2>

<button onclick="exportData()">保存（JSON）</button>
<input type="file" id="loadFile" accept=".json">
<button onclick="importData()">読み込み</button>

<script src="app.js"></script>
</body>
</html>
